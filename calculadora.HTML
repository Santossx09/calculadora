<!DOCTYPE html>
<html>

<head>
    <title>Calculadora</title>



</head>

<body>

    <h1>Calculadora</h1>

    <center>

        <input id="num1" type="number" placeholder="Número 1">

        <input id="num2" type="number" placeholder="Número 2">

        <br><br>

        <button onclick="somar()">Somar</button>

        <button onclick="subtrair()">Subtrair</button>

        <button onclick="multiplicar()">Multiplicar</button>

        <button onclick="dividir()">Dividir</button>

        <button onclick="porcentagem()">Porcentagem</button>

        <div id="resultado"></div>

        <br><br>

        <button onclick="testesComponentes()">
            testar componentes
        </button>

        <button onclick="testesUnitarios()">
            teste unitário
        </button>

        <button onclick="testesIntegracao()">
            teste integração
        </button>

        <button onclick="rodarTodos()">
            rodar todos
        </button>

        <div id="testes"></div>

    </center>








    <script>

        // =========================
        // funções cálculo
        // =========================

        function somarCalc(a, b) {
            return a + b;
        }

        function subtrairCalc(a, b) {
            return a - b;
        }

        function multiplicarCalc(a, b) {
            return a * b;
        }

        function dividirCalc(a, b) {

            if (b === 0) {
                return null;
            }

            return a / b;
        }

        function porcentagemCalc(a, b) {
            return (a * b) / 100;
        }










        // =========================
        // pegar valores
        // =========================

        function pegarValores() {

            const n1 =
                parseFloat(document.getElementById("num1").value);

            const n2 =
                parseFloat(document.getElementById("num2").value);

            if (isNaN(n1) || isNaN(n2)) {
                return null;
            }

            return { n1, n2 };
        }











        // =========================
        // mostrar resultado
        // =========================

        function mostrarResultado(texto, erro = false) {

            const resultadoDiv =
                document.getElementById("resultado");

            if (erro) {

                resultadoDiv.innerHTML =
                    `<span style="color:red;">
                        ${texto}
                    </span>`;

            } else {

                resultadoDiv.innerHTML =
                    "Resultado: " + texto;
            }
        }












        // =========================
        // operações
        // =========================

        function somar() {

            const valores = pegarValores();

            if (!valores) {

                return mostrarResultado(
                    "Digite números válidos",
                    true
                );
            }

            mostrarResultado(
                somarCalc(valores.n1, valores.n2)
            );
        }

        function subtrair() {

            const valores = pegarValores();

            if (!valores) {

                return mostrarResultado(
                    "Digite números válidos",
                    true
                );
            }

            mostrarResultado(
                subtrairCalc(valores.n1, valores.n2)
            );
        }

        function multiplicar() {

            const valores = pegarValores();

            if (!valores) {

                return mostrarResultado(
                    "Digite números válidos",
                    true
                );
            }

            mostrarResultado(
                multiplicarCalc(valores.n1, valores.n2)
            );
        }

        function dividir() {

            const valores = pegarValores();

            if (!valores) {

                return mostrarResultado(
                    "Digite números válidos",
                    true
                );
            }

            const resultado =
                dividirCalc(valores.n1, valores.n2);

            if (resultado === null) {

                return mostrarResultado(
                    "Não pode dividir por 0",
                    true
                );
            }

            mostrarResultado(resultado);
        }

        function porcentagem() {

            const valores = pegarValores();

            if (!valores) {

                return mostrarResultado(
                    "Digite números válidos",
                    true
                );
            }

            mostrarResultado(
                porcentagemCalc(valores.n1, valores.n2)
            );
        }









        // =========================
        // sistema testes
        // =========================

        function limparTestes() {

            document.getElementById("testes").innerHTML = "";
        }

        function testar(nome, fn) {

            const testesDiv =
                document.getElementById("testes");

            try {

                fn();

                testesDiv.innerHTML +=
                    `<p style="color:green;">
                        ✅ funcionando -> ${nome}
                    </p>`;

            } catch (erro) {

                testesDiv.innerHTML +=
                    `<p style="color:red;">
                        ❌ não está funcionando -> ${nome}
                    </p>`;
            }
        }






        // =========================
        // testes componentes
        // =========================

        function testesComponentes() {

            limparTestes();

            testar("Input num1 existe", () => {

                const el =
                    document.getElementById("num1");

                if (!el) {
                    throw new Error();
                }

            });

            testar("Input num2 existe", () => {

                const el =
                    document.getElementById("num2");

                if (!el) {
                    throw new Error();
                }

            });

            testar("Botões existem", () => {

                const botoes =
                    document.querySelectorAll("button");

                if (botoes.length < 9) {
                    throw new Error();
                }

            });

            testar("Div resultado existe", () => {

                const el =
                    document.getElementById("resultado");

                if (!el) {
                    throw new Error();
                }

            });

        }











        // =========================
        // testes unitários
        // =========================

        function testesUnitarios() {

            limparTestes();

            testar("Soma funciona", () => {

                if (somarCalc(2, 2) !== 4) {
                    throw new Error();
                }

            });

            testar("Subtração funciona", () => {

                if (subtrairCalc(10, 5) !== 5) {
                    throw new Error();
                }

            });

            testar("Multiplicação funciona", () => {

                if (multiplicarCalc(2, 3) !== 6) {
                    throw new Error();
                }

            });

            testar("Divisão funciona", () => {

                if (dividirCalc(10, 2) !== 5) {
                    throw new Error();
                }

            });

            testar("Divisão por 0 funciona", () => {

                if (dividirCalc(10, 0) !== null) {
                    throw new Error();
                }

            });

            testar("Porcentagem funciona", () => {

                if (porcentagemCalc(200, 10) !== 20) {
                    throw new Error();
                }

            });

        }











        // =========================
        // testes integração
        // =========================

        function testesIntegracao() {

            limparTestes();

            testar("Botão soma atualiza resultado", () => {

                document.getElementById("num1").value = 5;
                document.getElementById("num2").value = 5;

                somar();

                const resultado =
                    document.getElementById("resultado").innerText;

                if (!resultado.includes("10")) {
                    throw new Error();
                }

            });

            testar("Erro aparece com campo vazio", () => {

                document.getElementById("num1").value = "";
                document.getElementById("num2").value = "";

                somar();

                const resultado =
                    document.getElementById("resultado").innerText;

                if (!resultado.includes("Digite números válidos")) {
                    throw new Error();
                }

            });

            testar("Porcentagem atualiza resultado", () => {

                document.getElementById("num1").value = 200;
                document.getElementById("num2").value = 10;

                porcentagem();

                const resultado =
                    document.getElementById("resultado").innerText;

                if (!resultado.includes("20")) {
                    throw new Error();
                }

            });

        }









        

        // =========================
        // rodar tudo
        // =========================

        function rodarTodos() {

            limparTestes();

            testesComponentes();
            testesUnitarios();
            testesIntegracao();
        }

    </script>

</body>

</html>
